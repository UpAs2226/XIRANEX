<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Upanshi Srivastaa">
    <title>Contact | Upanshi Srivastaa</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Same header as above -->
    <header role="banner">
        <nav aria-label="Main navigation">
            <h1><a href="index.html">Upanshi Srivastaa</a></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" role="main">
        <h1>Contact Me</h1>
        <form action="#" method="POST" aria-labelledby="contact-form-heading">
            <h2 id="contact-form-heading">Send a Message</h2>

            <label for="name">Full Name <span aria-hidden="true">*</span></label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email <span aria-hidden="true">*</span></label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message <span aria-hidden="true">*</span></label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </main>

    <footer role="contentinfo">
        <p>&copy; <span id="year"></span> Upanshi Srivastaa</p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
